# Server config
server.port=8080

# App info
spring.application.name=whatsappbot

# Logging levels
logging.level.root=WARN
logging.level.com.example.whatsappbot=DEBUG
logging.level.org.springframework.web=INFO

# Log format with timestamp
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n